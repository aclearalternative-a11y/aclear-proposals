services:
  - type: web
    name: aclear-proposals
    runtime: node
    buildCommand: pip3 install weasyprint || pip install weasyprint || true && npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
